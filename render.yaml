services:
  - type: web
    name: fixlocal-api
    runtime: node
    plan: free
    rootDir: .
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @fixlocal/api build
    startCommand: npx --yes pnpm --filter @fixlocal/api start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: API_CORS_ORIGIN
        value: 'https://fixlocal-app.vercel.app,https://mobile-kappa-virid.vercel.app'
